name: Automate Core Versioning and Cleanup

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  update-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Auto-increment Core & Update Changelog
        run: python3 .github/scripts/update_core.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/gapp_core.dart changelog.md
          git commit -m "chore: auto-increment core build and changelog [skip ci]"
          git push origin develop

      - name: Delete Feature Branches
        run: |
          # Borra la rama origen del PR
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          git push origin --delete $PR_BRANCH || true
          
          # Intenta borrar su par (Si el PR es feature/core-123, borra feature/api-123)
          API_BRANCH="${PR_BRANCH/core/api}"
          if [ "$PR_BRANCH" != "$API_BRANCH" ]; then
            git push origin --delete $API_BRANCH || true
          fi