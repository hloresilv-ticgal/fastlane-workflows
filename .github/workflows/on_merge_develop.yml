name: Automate Versioning and Cleanup

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  update-version-and-cleanup:
    # Solo se ejecuta si el PR fue aceptado (merged), no si fue cerrado sin mergear
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para hacer commit y borrar ramas

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update Dart Version and Changelog
        run: |
          python3 .github/scripts/update_version.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/gapp_version.dart changelog.md
          git commit -m "chore: auto-increment version and update changelog [skip ci]"
          git push origin develop

      - name: Delete Feature Branches
        run: |
          # Borra la rama origen del Pull Request (Ej: feature/core)
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          git push origin --delete $PR_BRANCH || true
          
          # Si usas una convención de nombres (ej: feature/api-XXX emparejada con feature/core-XXX), 
          # puedes borrar la de la API dinámicamente. 
          # Suponiendo que la nombras igual pero con "api" en vez de "core":
          API_BRANCH="${PR_BRANCH/core/api}"
          if [ "$PR_BRANCH" != "$API_BRANCH" ]; then
            git push origin --delete $API_BRANCH || true
          fi